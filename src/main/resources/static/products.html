<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS - Product Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <nav class="navbar">
        <a href="/index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                </path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            OMS
        </a>
        <div class="nav-links">
            <a href="/index.html" class="nav-link">Dashboard</a>
            <a href="/products.html" class="nav-link active">Products</a>
            <a href="/categories.html" class="nav-link">Categories</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Products</h1>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Manage your organization's product catalog
                </p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Product
            </button>
        </div>

        <div class="card">
            <div class="table-toolbar" style="display: flex; gap: 1rem; align-items: center;">
                <div class="form-group" style="margin-bottom: 0; min-width: 200px;">
                    <select id="shipperFilter"
                        style="padding: 0.6rem 1rem; border-color: rgba(255,255,255,0.1); background-color: rgba(15, 23, 42, 0.5);"
                        onchange="handleShipperChange()">
                        <option value="">All Shippers</option>
                        <!-- Dynamic shippers load here -->
                    </select>
                </div>

                <div class="search-box" style="margin-left: auto;">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="debounceSearch()">
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Unique ID</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Dimensions</th>
                            <th>Weight</th>
                            <th>Serializable</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <!-- Dynamic content will load here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div id="pageInfo" style="color: var(--text-secondary); font-size: 0.9rem;">
                    Showing page 1 of 1
                </div>
                <div class="page-controls">
                    <button class="btn-page" id="prevBtn" onclick="changePage(-1)">Previous</button>
                    <button class="btn-page" id="nextBtn" onclick="changePage(1)">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="modalTitle">Add New Product</h2>
                    <p id="modalShipperContext"
                        style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;"></p>
                </div>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <input type="hidden" id="hiddenShipperId">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productName">Product Name *</label>
                            <input type="text" id="productName" required>
                        </div>
                        <div class="form-group">
                            <label for="productUniqueId">Unique ID</label>
                            <input type="text" id="productUniqueId">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label for="categoryId">Category</label>
                            <select id="categoryId">
                                <option value="">Select Category</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label>Dimensions (L × B × H)</label>
                            <div style="display: flex; gap: 0.5rem;">
                                <input type="number" id="length" step="0.01" placeholder="Length">
                                <input type="number" id="breadth" step="0.01" placeholder="Breadth">
                                <input type="number" id="height" step="0.01" placeholder="Height">
                            </div>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="dimensionUom">Dimension UOM</label>
                            <select id="dimensionUom">
                                <option value="cm">cm</option>
                                <option value="in">in</option>
                                <option value="m">m</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="weight">Weight</label>
                            <input type="number" id="weight" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="weightUom">Weight UOM</label>
                            <select id="weightUom">
                                <option value="kg">kg</option>
                                <option value="lb">lb</option>
                                <option value="g">g</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="serializable">
                        <label for="serializable" style="margin-bottom: 0;">Serializable Product</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/products.js"></script>
</body>

</html>
