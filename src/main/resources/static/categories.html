<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMS - Categories Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <nav class="navbar">
        <a href="/index.html" class="nav-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                </path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            OMS
        </a>
        <div class="nav-links">
            <a href="/index.html" class="nav-link">Dashboard</a>
            <a href="/products.html" class="nav-link">Products</a>
            <a href="/categories.html" class="nav-link active">Categories</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Categories</h1>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Organize your product catalog</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Category
            </button>
        </div>

        <div class="card">
            <div class="table-toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search categories..."
                            onkeyup="debounceSearch()">
                    </div>
                </div>
                <div class="toolbar-right">
                    <div class="filter-group">
                        <label for="shipperFilter">Filter by Shipper:</label>
                        <select id="shipperFilter" onchange="handleShipperChange()">
                            <option value="">All Shippers</option>
                        </select>
                    </div>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="categoriesTable">
                    <thead>
                        <tr>
                            <th>Parent Category</th>
                            <th>Child Category</th>
                            <th>Shipper</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody">
                        <!-- Dynamic content will load here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <div id="pageInfo" style="color: var(--text-secondary); font-size: 0.9rem;">
                    Showing page 1 of 1
                </div>
                <div class="page-controls">
                    <button class="btn-page" id="prevBtn" onclick="changePage(-1)">Previous</button>
                    <button class="btn-page" id="nextBtn" onclick="changePage(1)">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title" id="modalTitle">Add New Category</h2>
                    <p id="modalShipperContext"
                        style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 2px;"></p>
                </div>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <input type="hidden" id="hiddenShipperId">

                    <div class="form-group">
                        <label for="categoryName">Child Category Name *</label>
                        <input type="text" id="categoryName" placeholder="Enter child category name..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="parentCategoryId">Existing Parent Category</label>
                            <select id="parentCategoryId">
                                <option value="">-- No Parent (Root) --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="parentCategoryName">Or New Parent Category</label>
                            <input type="text" id="parentCategoryName" placeholder="Create new parent category...">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveCategory()">Save Category</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/categories.js"></script>
</body>

</html>
